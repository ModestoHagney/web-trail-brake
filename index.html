<!DOCTYPE html>
<html>
<head>
    <title>Brake Telemetry</title>
    <style>
        :root {
            --bg: #0b0d13;
            --panel: #141721;
            --panel-2: #1c2130;
            --text: #f3f5f7;
            --muted: #7a879e;
            --accent: #62d2a2;
            --accent-2: #3aa0ff;
            --border: #262c3d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: ui-sans-serif, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .shell {
            width: 90%;
            max-width: 90vw;
            margin: 15px auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            height: 40px;
            &[hidden] { display: none !important; }
        }

        .mode-container {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            height: 36px; 
            width: 42px;    
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            transition: border-color 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--accent-2);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            
            /* Prevents blue highlighting on click */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10+ */
            user-select: none; /* Modern browsers */
        }

        button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 100ms ease;
        }

        button:hover {
            border-color: var(--accent-2);
        }

        #setup-view {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            justify-content: center;
        }

        .card {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 100ms ease, transform 100ms ease;
            will-change: border-color, filter;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-2);
        }

        .card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(98, 210, 162, 0.5);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .device-name {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            color: var(--muted);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .axis-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .axis-box {
            flex: 0 0 55px;
            padding: 8px 4px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .pedal-meter {
            width: 10px;
            height: 60px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .pedal-fill {
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(180deg, var(--accent-2), var(--accent));
        }

        .axis-label {
            font-size: 0.7rem;
            color: var(--muted);
        }

        .controls-panel {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .settings-row {
            display: grid;
            grid-template-columns: 140px 120px 120px 160px;
            align-items: center;
            gap: 24px;
        }

        .row-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .input-group input[type="number"] {
            background: #07080b;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px;
            border-radius: 6px;
            width: 70px;
            font-family: inherit;
        }

        .input-group input[type="number"]:disabled {
            background: #11141b;
            color: var(--muted);
            border-color: #1a1f2e;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #practice-view {
            display: none;
            flex-direction: column;
            flex: 1;
            width: 100%;
            position: relative;
            gap: 16px;
        }

        .canvas-container {
            height: 500px;
            background: #07080b;
            border: 1px solid var(--border);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .mode-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0 14px; /* Removed vertical padding, using height instead */
            height: 36px;    /* Matches icon-btn height exactly */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .mode-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(98, 210, 162, 0.05);
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <h1 id="page-title">Brake Pedal Setup</h1>
            
            <div id="mode-toolbar" class="toolbar" hidden>
                <div class="mode-container">
                    <button id="btn-graph" class="mode-btn active">Graph</button>
                    <button id="btn-hold" class="mode-btn">Hold</button>
                    <button id="btn-flappy" class="mode-btn">Flappy</button> </div>
                <button id="change-device-btn" class="icon-btn">↺</button>
            </div>
        </div>

        <div id="setup-view"></div>

        <div id="practice-view">
            <div class="canvas-container">
                <canvas id="telemetry-canvas"></canvas>
            </div>

            <div id="graph-controls" class="controls-panel">
                <div class="settings-row">
                    <div class="row-label">Brake Pressure</div>
                    <div class="input-group">
                        <input type="checkbox" id="rand-p-toggle">
                        <label for="rand-p-toggle">Randomize</label>
                    </div>
                    <div class="input-group">
                        <label for="p-swing">Min:</label>
                        <input type="number" id="p-swing" value="50" min="1" max="100" step="1" disabled>%
                    </div>
                    <div class="input-group">
                        <label for="target-pressure">Max:</label>
                        <input type="number" id="target-pressure" value="80" min="1" max="100" step="1">%
                    </div>
                </div>

                <div class="settings-row">
                    <div class="row-label">Target Duration</div>
                    <div class="input-group">
                        <input type="checkbox" id="rand-t-toggle">
                        <label for="rand-t-toggle">Randomize</label>
                    </div>
                    <div class="input-group">
                        <label for="t-swing">Min:</label>
                        <input type="number" id="t-swing" value="2.0" min="0.5" max="10" step="0.1" disabled>s
                    </div>
                    <div class="input-group">
                        <label for="target-time">Max:</label>
                        <input type="number" id="target-time" value="4.0" min="0.5" max="10" step="0.1">s
                    </div>
                </div>

                <div class="settings-row">
                    <div class="row-label">Hold Tolerance</div>
                    <div class="input-group"></div> <div class="input-group"></div> <div class="input-group">
                        <label for="hold-tolerance">± Range:</label>
                        <input type="number" id="hold-tolerance" value="2" min="0" max="10" step="1">%
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const setupView = document.getElementById('setup-view');
        const practiceView = document.getElementById('practice-view');
        const changeDeviceBtn = document.getElementById('change-device-btn');
        const canvas = document.getElementById('telemetry-canvas');
        const ctx = canvas.getContext('2d');
        const modeToolbar = document.getElementById('mode-toolbar');

        const state = {
            view: 'SETUP',
            activeMode: 'GRAPH',
            selectedDeviceIndex: null,
            selectedAxisIndex: null
        };

        const flappyState = {
            playerY: 0,
            playerX: 150,
            playerSize: 6,       // Matches your telemetry dot size
            gates: [],
            gateSpeed: 3,       // Slightly slower
            gateWidth: 4,       // Super thin, like your target lines
            gateGap: 90,        // Tighter gaps (was 160)
            score: 0,
            hiScore: 0
        };

        const restingBaselines = {};
        let telemetryData = []; 
        const windowSizeMs = 10000; 
        const pastOffsetMs = 5000;  

        const runState = {
            lastPLoopId: -1,
            lastTLoopId: -1,
            currentPeak: 80,
            currentTime: 4.0
        };

        const pageTitle = document.getElementById('page-title');
        let secretClicks = 0;
        let secretTimer = null;

        function getConnectedGamepads() {
            return Array.from(navigator.getGamepads()).filter(Boolean);
        }

        function normalizeAxisValue(value) {
            return ((value + 1) / 2) * 100;
        }

        function shortenDeviceName(name) {
            return name.split("(")[0].trim();
        }

        function getControllerColor(index) {
            const palette = ["90, 201, 255", "255, 130, 112", "116, 232, 171", "255, 196, 92", "187, 153, 255"];
            return palette[index % palette.length];
        }

        function getDeviceMovement(gpIndex, axes) {
            if (!axes.length) return 0;
            if (!restingBaselines[gpIndex]) {
                restingBaselines[gpIndex] = [...axes];
                return 0;
            }
            let totalDelta = 0;
            const baseline = restingBaselines[gpIndex];
            for (let i = 0; i < axes.length; i++) {
                totalDelta += Math.abs(axes[i] - (baseline[i] || 0));
            }
            const avgDelta = totalDelta / axes.length;
            if (avgDelta < 0.02) return 0;
            return Math.min(avgDelta * 2.5, 1.0);
        }

        function setView(viewMode) {
            state.view = viewMode;

            if (viewMode === 'SETUP') {
                pageTitle.textContent = "Brake Pedal Setup";
                modeToolbar.hidden = true; // Hides the whole row
                setupView.style.display = 'grid';
                practiceView.style.display = 'none';
                renderSetup();
            } else {
                pageTitle.textContent = "Telemetry View";
                modeToolbar.hidden = false; // Shows the whole row
                setupView.style.display = 'none';
                practiceView.style.display = 'flex';
                telemetryData = []; 
                resizeCanvas();
                switchMode('GRAPH'); 
            }
        }

        function renderSetup() {
            const gamepads = getConnectedGamepads();

            if (gamepads.length === 0) {
                setupView.innerHTML = `
                    <div class="card" style="grid-column: 1 / -1;">
                        <div class="device-name">No controllers detected</div>
                        <p style="color:var(--muted); margin:8px 0 0;">Press a pedal or button in Chrome to wake the device up.</p>
                    </div>
                `;
                return;
            }

            const isHidden = state.selectedDeviceIndex !== null;
            const instructionHTML = `
                <div style="grid-column: 1 / -1; color: var(--muted); font-size: 0.95rem; margin-bottom: 12px; visibility: ${isHidden ? 'hidden' : 'visible'};">
                    Select a device, if its not in the list press a pedal.
                </div>
            `;

            setupView.innerHTML = instructionHTML + gamepads.map((gp) => {
                const isSelected = gp.index === state.selectedDeviceIndex;
                const deviceColor = getControllerColor(gp.index);

                const axisMarkup = isSelected ? `
                    <div style="color: var(--muted); font-size: 0.85rem; margin-bottom: 12px;">
                        Press your pedal to find the axis, click it to launch.
                    </div>
                    <div class="axis-list">
                        ${gp.axes.map((_, idx) => `
                            <div class="axis-box" data-axis-index="${idx}" data-device-index="${gp.index}">
                                <div class="pedal-meter">
                                    <div class="pedal-fill" id="fill-${gp.index}-${idx}" style="height: 0%"></div>
                                </div>
                                <div class="axis-label">A${idx}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : "";

                return `
                    <div class="card ${isSelected ? 'selected' : ''}" data-device-index="${gp.index}" id="device-card-${gp.index}" style="--base-color: ${deviceColor}">
                        <div class="title-row">
                            <div class="device-name" title="${gp.id}">${shortenDeviceName(gp.id) || `Device ${gp.index}`}</div>
                            <div class="badge">${gp.axes.length}A</div>
                        </div>
                        ${axisMarkup}
                    </div>
                `;
            }).join('');

            setupView.querySelectorAll(".card[data-device-index]").forEach(card => {
                card.addEventListener("pointerdown", (e) => {
                    if (e.target.closest(".axis-box")) return;
                    state.selectedDeviceIndex = Number(card.dataset.deviceIndex);
                    state.selectedAxisIndex = null;
                    renderSetup();
                });
            });

            setupView.querySelectorAll(".axis-box[data-axis-index]").forEach(box => {
                box.addEventListener("pointerdown", () => {
                    state.selectedDeviceIndex = Number(box.dataset.deviceIndex);
                    state.selectedAxisIndex = Number(box.dataset.axisIndex);
                    setView('PRACTICE');
                });
            });
        }

        function resizeCanvas() {
            if (state.view !== 'PRACTICE') return;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resizeCanvas);

        function getSelectedAxisValue() {
            const gamepads = getConnectedGamepads();
            const gp = gamepads.find(g => g.index === state.selectedDeviceIndex);
            if (gp && state.selectedAxisIndex !== null) {
                return normalizeAxisValue(gp.axes[state.selectedAxisIndex]) / 100; // Returns normalized 0.0 to 1.0
            }
            return 0;
        }

        function drawCanvas(now, currentBrake) {
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            const baseP = state.activeMode === 'HOLD' ? runState.currentPeak : (Number(document.getElementById('target-pressure').value) || 80);
            const pixelsPerSec = w / (windowSizeMs / 1000);

            // 1. Draw Grid
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#1a1f2e';
            ctx.fillStyle = '#6a7282'; 
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';

            [0.25, 0.5, 0.75].forEach(pct => {
                ctx.beginPath();
                ctx.moveTo(0, h - h * pct);
                ctx.lineTo(w, h - h * pct);
                ctx.stroke();
            });

            const halfWindowSec = (windowSizeMs / 1000) / 2;
            for (let sec = -Math.floor(halfWindowSec); sec <= Math.floor(halfWindowSec); sec++) {
                const x = (w / 2) + (sec * pixelsPerSec);
                if (x > 20 && x < w - 20) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h); 
                    ctx.stroke();

                    const label = sec === 0 ? "0s" : (sec > 0 ? `+${sec}s` : `${sec}s`);
                    ctx.fillText(label, x, h - 8);
                }
            }

            // 2. Readout
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`${Math.round(currentBrake)}%`, 20, 40);

            const masterSec = now / 1000;

            // Pressure Randomizer
            const pIntervalSec = runState.currentTime; 
            const pLoopId = Math.floor(masterSec / pIntervalSec);

            if (pLoopId > runState.lastPLoopId) {
                runState.lastPLoopId = pLoopId;
                const pCheck = document.getElementById('rand-p-toggle');
                if (pCheck && pCheck.checked) {
                    const pMin = Number(document.getElementById('p-swing').value) || 50;
                    const min = Math.min(pMin, baseP);
                    const max = Math.max(pMin, baseP);
                    runState.currentPeak = Math.floor(Math.random() * (max - min + 1)) + min;
                } else {
                    runState.currentPeak = baseP;
                }
            }

            // Time Randomizer
            const baseT = Number(document.getElementById('target-time').value) || 4.0;
            const tLoopId = Math.floor(masterSec / baseT);

            if (tLoopId > runState.lastTLoopId) {
                runState.lastTLoopId = tLoopId;
                const tCheck = document.getElementById('rand-t-toggle');
                if (tCheck && tCheck.checked) {
                    const tMin = Number(document.getElementById('t-swing').value) || 2.0;
                    const min = Math.min(tMin, baseT);
                    const max = Math.max(tMin, baseT);
                    const minScaled = Math.floor(min * 10);
                    const maxScaled = Math.floor(max * 10);
                    runState.currentTime = (Math.floor(Math.random() * (maxScaled - minScaled + 1)) + minScaled) / 10;
                } else {
                    runState.currentTime = baseT;
                }
            }

            // 4. Draw Horizontal Target
            const targetY = h - (runState.currentPeak / 100) * h;

            ctx.strokeStyle = runState.holdStartTime ? '#62d2a2' : 'rgba(255, 196, 92, 0.4)';  
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 6]);  
            ctx.beginPath();
            ctx.moveTo(0, targetY);
            ctx.lineTo(w, targetY);
            ctx.stroke();
            ctx.setLineDash([]);

            // 5. Draw Vertical Red Target Line (Only in Graph Mode)
            if (state.activeMode === 'GRAPH') {
                const lineTimeSec = (pLoopId + 1) * runState.currentTime; 
                const timeDiffMs = (lineTimeSec - masterSec) * 1000;
                const targetX = (w / 2) + (timeDiffMs / windowSizeMs) * w;

                if (targetX > 0 && targetX < w) {
                    ctx.strokeStyle = '#ff8270'; 
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(targetX, 0);
                    ctx.lineTo(targetX, h); 
                    ctx.stroke();
                }
            }

            // Draw Target % in Top Center (Only in Hold Mode)
            if (state.activeMode === 'HOLD') {
                ctx.fillStyle = '#ffc45c'; // Yellow
                ctx.font = 'bold 32px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`${runState.currentPeak}%`, w / 2, 50);
            }

            // 6. User Trace
            const cutoff = now - pastOffsetMs;
            while (telemetryData.length > 0 && telemetryData[0].time < cutoff) {
                telemetryData.shift();
            }

            telemetryData.push({ time: now, val: currentBrake });

            if (telemetryData.length > 1) {
                ctx.strokeStyle = '#3aa0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();

                let leadX = 0;
                let leadY = 0;

                telemetryData.forEach((pt, idx) => {
                    const timeDiff = pt.time - (now - pastOffsetMs);
                    const x = (timeDiff / windowSizeMs) * w;
                    const y = h - (pt.val / 100) * h;

                    if (idx === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);

                    if (idx === telemetryData.length - 1) {
                        leadX = x;
                        leadY = y;
                    }
                });
                ctx.stroke();

                // --- VISUAL PROGRESS RING ---
                if (state.activeMode === 'HOLD' && runState.holdStartTime && runState.requiredHoldTime) {
                    const elapsed = (now - runState.holdStartTime) / 1000;
                    const pct = Math.min(elapsed / runState.requiredHoldTime, 1.0);

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(leadX, leadY, 14, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = '#62d2a2'; // Green filling clockwise
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(leadX, leadY, 14, -Math.PI / 2, (-Math.PI / 2) + (Math.PI * 2 * pct));
                    ctx.stroke();
                }

                ctx.fillStyle = '#3aa0ff';
                ctx.beginPath();
                ctx.arc(leadX, leadY, 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let flappyFrame = 0;

        function flappyTick() {
            if (state.activeMode !== 'FLAPPY' || state.view !== 'PRACTICE') return;

            const now = performance.now();
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            // 1. Get Live Brake Pedal (0 to 100)
            let currentBrake = 0;
            const gamepads = getConnectedGamepads();
            const gp = gamepads.find(g => g.index === state.selectedDeviceIndex);
            if (gp && state.selectedAxisIndex !== null) {
                currentBrake = normalizeAxisValue(gp.axes[state.selectedAxisIndex]);
            }

            // 2. Draw Your Standard Background Grid (No Text Readouts)
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#1a1f2e';
            
            [0.25, 0.5, 0.75].forEach(pct => {
                ctx.beginPath();
                ctx.moveTo(0, h - h * pct);
                ctx.lineTo(w, h - h * pct);
                ctx.stroke();
            });

            const pixelsPerSec = w / (windowSizeMs / 1000);
            const halfWindowSec = (windowSizeMs / 1000) / 2;
            for (let sec = -Math.floor(halfWindowSec); sec <= Math.floor(halfWindowSec); sec++) {
                const x = (w / 2) + (sec * pixelsPerSec);
                if (x > 20 && x < w - 20) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h); 
                    ctx.stroke();
                }
            }

            // 3. Draw Your Standard Blue Trace (Centered horizontally)
            const cutoff = now - pastOffsetMs;
            while (telemetryData.length > 0 && telemetryData[0].time < cutoff) {
                telemetryData.shift();
            }

            telemetryData.push({ time: now, val: currentBrake });

            if (telemetryData.length > 1) {
                ctx.strokeStyle = '#3aa0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();

                let leadX = 0;
                let leadY = 0;

                telemetryData.forEach((pt, idx) => {
                    const timeDiff = pt.time - (now - pastOffsetMs);
                    const x = (timeDiff / windowSizeMs) * w;
                    const y = h - (pt.val / 100) * h;

                    if (idx === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);

                    if (idx === telemetryData.length - 1) {
                        leadX = x;
                        leadY = y;
                    }
                });
                ctx.stroke();

                ctx.fillStyle = '#3aa0ff';
                ctx.beginPath();
                ctx.arc(leadX, leadY, 6, 0, Math.PI * 2); 
                ctx.fill();
            }

            // 4. Spawn Gates
            flappyFrame++;
            if (flappyFrame % 180 === 0) {
                const minGapY = 20; 
                const maxGapY = h - flappyState.gateGap - 20; 
                const gapTop = Math.random() * (maxGapY - minGapY) + minGapY;

                flappyState.gates.push({
                    x: w,
                    gapTop: gapTop,
                    gapBottom: gapTop + flappyState.gateGap,
                    passed: false
                });
            }

            // 5. Draw Red Gates & Check Collision
            ctx.strokeStyle = '#ff8270'; 
            ctx.lineWidth = 2; // Exact same thickness as the vertical grid line

            for (let i = flappyState.gates.length - 1; i >= 0; i--) {
                const gate = flappyState.gates[i];
                gate.x -= flappyState.gateSpeed;

                ctx.beginPath();
                ctx.moveTo(gate.x, 0);
                ctx.lineTo(gate.x, gate.gapTop);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(gate.x, gate.gapBottom);
                ctx.lineTo(gate.x, h);
                ctx.stroke();

                const leadX = w / 2;
                const leadY = h - (currentBrake / 100) * h;

                const hitHorizontally = (leadX > gate.x - 4) && (leadX < gate.x + 4);
                const hitVertically = (leadY < gate.gapTop) || (leadY > gate.gapBottom);

                if (hitHorizontally && hitVertically) {
                    if (flappyState.score > flappyState.hiScore) flappyState.hiScore = flappyState.score;
                    flappyState.gates = [];
                    flappyState.score = 0;
                }

                if (!gate.passed && gate.x < leadX) {
                    flappyState.score++;
                    gate.passed = true;
                }

                if (gate.x < 0) {
                    flappyState.gates.splice(i, 1);
                }
            }

            // 6. Standardized Flappy Readout (Matches Graph % location)
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText(`Score: ${flappyState.score}`, 20, 40);
            
            ctx.font = '14px sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillText(`Best: ${flappyState.hiScore}`, 20, 65);

            requestAnimationFrame(flappyTick);
        }

        function resetFlappyGame() {
            flappyState.gates = [];
            flappyState.score = 0;
            flappyFrame = 0;
            requestAnimationFrame(flappyTick);
        }

        function tick() {
            const gamepads = getConnectedGamepads();
            const now = performance.now();

            if (state.view === 'SETUP') {
                gamepads.forEach((gp) => {
                    const cardEl = document.getElementById(`device-card-${gp.index}`);
                    if (!cardEl) return;

                    const isSelected = gp.index === state.selectedDeviceIndex;
                    const movement = getDeviceMovement(gp.index, gp.axes);
                    const deviceColor = cardEl.style.getPropertyValue('--base-color');

                    if (!isSelected) {
                        const bgAlpha = (movement * 0.45).toFixed(3);
                        const borderAlpha = (0.2 + movement * 0.8).toFixed(3);
                        const glowSpread = (movement * 35).toFixed(1);

                        cardEl.style.background = `radial-gradient(circle at 50% 50%, rgba(${deviceColor}, ${bgAlpha}), transparent 70%), linear-gradient(180deg, rgba(27,31,39,0.95), rgba(35,41,54,0.95))`;
                        cardEl.style.borderColor = `rgba(${deviceColor}, ${borderAlpha})`;
                        cardEl.style.filter = movement > 0 ? `drop-shadow(0 0 ${glowSpread}px rgba(${deviceColor}, ${movement * 0.65}))` : "none";
                    } else {
                        gp.axes.forEach((val, idx) => {
                            const fillEl = document.getElementById(`fill-${gp.index}-${idx}`);
                            if (fillEl) fillEl.style.height = `${normalizeAxisValue(val)}%`;
                        });
                    }
                });

            } else if (state.view === 'PRACTICE' && (state.activeMode === 'GRAPH' || state.activeMode === 'HOLD')) {
            let currentBrake = 0;
            const gamepads = getConnectedGamepads();
            const gp = gamepads.find(g => g.index === state.selectedDeviceIndex);
            if (gp && state.selectedAxisIndex !== null) {
                currentBrake = normalizeAxisValue(gp.axes[state.selectedAxisIndex]);
            }
            
            drawCanvas(now, currentBrake);

            if (state.activeMode === 'HOLD') {
                const target = runState.currentPeak;
                
                // 1. Read Live Tolerance from UI (defaults to 3 if empty)
                const tolerance = Number(document.getElementById('hold-tolerance')?.value) || 3; 

                if (currentBrake >= (target - tolerance) && currentBrake <= (target + tolerance)) {
                    if (!runState.holdStartTime) {
                        runState.holdStartTime = now; 
                    } else {
                        const elapsed = (now - runState.holdStartTime) / 1000;
                        
                        // 2. Read Time Target bounds from UI
                        const tMin = Number(document.getElementById('t-swing').value) || 1.0;
                        const tMax = Number(document.getElementById('target-time').value) || 3.0;
                        const minT = Math.min(tMin, tMax);
                        const maxT = Math.max(tMin, tMax);
                        
                        if (!runState.requiredHoldTime) {
                            runState.requiredHoldTime = Math.random() * (maxT - minT) + minT;
                        }

                        if (elapsed >= runState.requiredHoldTime) {
                            runState.holdStartTime = null; 
                            runState.requiredHoldTime = null; 

                            // 3. Roll a New Pressure Target (Minimum 15% Jump)
                            const pMin = Number(document.getElementById('p-swing').value) || 40;
                            const pMax = Number(document.getElementById('target-pressure').value) || 90;
                            const minP = Math.min(pMin, pMax);
                            const maxP = Math.max(pMin, pMax);

                            let newPeak = target;
                            let attempts = 0;
                            
                            while (Math.abs(newPeak - target) < 15 && attempts < 20) {
                                newPeak = Math.floor(Math.random() * (maxP - minP + 1)) + minP;
                                attempts++;
                            }
                            runState.currentPeak = newPeak;
                        }
                    }
                } else {
                    runState.holdStartTime = null; 
                }
            }
        }

            requestAnimationFrame(tick);
        }

        function switchMode(newMode) {
            state.activeMode = newMode;
            const controls = document.getElementById('graph-controls');

            document.getElementById('btn-graph').classList.toggle('active', newMode === 'GRAPH');
            document.getElementById('btn-hold').classList.toggle('active', newMode === 'HOLD');
            document.getElementById('btn-flappy').classList.toggle('active', newMode === 'FLAPPY');

            telemetryData = []; 

            if (newMode === 'FLAPPY') {
                controls.style.visibility = 'hidden'; // Only hide for Flappy
                
                flappyState.gates = [];
                flappyState.score = 0;
                flappyFrame = 0;
                
                requestAnimationFrame(flappyTick);
            } else {
                controls.style.visibility = 'visible'; // Keep visible for GRAPH and HOLD
                runState.holdStartTime = null; 
            }
        }

        changeDeviceBtn.addEventListener('pointerdown', () => setView('SETUP'));

        window.addEventListener("gamepadconnected", () => {
            if (state.view === 'SETUP') renderSetup();
        });
        window.addEventListener("gamepaddisconnected", (e) => {
            delete restingBaselines[e.gamepad.index];
            if (state.view === 'SETUP') renderSetup();
        });

        setView('SETUP');
        tick();

        document.getElementById('btn-graph').addEventListener('pointerdown', () => switchMode('GRAPH'));
        document.getElementById('btn-hold').addEventListener('pointerdown', () => switchMode('HOLD'));
        document.getElementById('btn-flappy').addEventListener('pointerdown', () => switchMode('FLAPPY'));

    </script>
</body>
