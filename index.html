<!DOCTYPE html>
<html>
<head>
    <title>Brake Pedal Setup</title>
    <style>
        :root {
            --bg: #111318;
            --panel: #1b1f27;
            --panel-2: #232936;
            --text: #f3f5f7;
            --muted: #9aa4b2;
            --accent: #62d2a2;
            --accent-2: #3aa0ff;
            --border: #313949;
            --active: #f6c760;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: ui-sans-serif, system-ui, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 15% 10%, rgba(58, 160, 255, 0.10), transparent 45%),
                radial-gradient(circle at 85% 12%, rgba(98, 210, 162, 0.08), transparent 42%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text);
        }

        .shell {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .subtle {
            margin: 0 0 24px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-width, 220px)), var(--card-width, 220px)));
            gap: 16px;
            align-items: start;
            justify-content: center;
        }

        .card {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
        }

        .card:hover {
            transform: translateY(-1px);
            border-color: var(--accent-2);
        }

        .card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(98, 210, 162, 0.5), 0 14px 30px rgba(0, 0, 0, 0.35);
            transform: translateY(-2px);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .device-name {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .badge {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .axis-list {
            display: grid;
            gap: 10px;
        }

        .axis-list.vertical {
            display: grid;
            grid-template-columns: repeat(var(--axis-count, 3), minmax(0, 1fr));
            align-items: end;
            gap: 10px;
            margin-top: 14px;
            min-height: 215px;
            padding-bottom: 4px;
        }

        .axis-row {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        .axis-row.selected {
            border-color: var(--accent);
        }

        .axis-row.vertical {
            width: 100%;
            min-width: 0;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .axis-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.92rem;
        }

        .axis-label {
            font-size: 0.76rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.1;
        }

        .meter {
            height: 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            overflow: hidden;
        }

        .pedal-meter {
            width: 18px;
            height: 145px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent-2), var(--accent));
            transition: width 60ms linear;
        }

        .pedal-fill {
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(180deg, var(--accent-2), var(--accent));
            transition: height 60ms linear;
        }

        .axis-row.vertical.selected .pedal-meter {
            box-shadow: 0 0 0 2px rgba(98, 210, 162, 0.45), 0 0 18px rgba(98, 210, 162, 0.3);
        }

        .axis-row.vertical.selected .pedal-fill {
            background: linear-gradient(180deg, #7be7ff, #7effb8);
        }

        .fill.active {
            background: linear-gradient(90deg, var(--active), var(--accent));
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .card,
        .axis-row,
        button {
            touch-action: manipulation;
        }

        button:hover {
            border-color: var(--accent-2);
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
        }

        @media (max-width: 640px) {
            body {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <h1>Brake Pedal Setup</h1>
        <p class="subtle">Choose the USB controller that contains the brake pedal, then choose the axis that moves when you press it.</p>

        <div class="toolbar">
            <button id="changeDevice" hidden>Choose another device</button>
        </div>

        <div id="app"></div>
    </div>

    <script>
        const app = document.getElementById("app");
        const changeDeviceButton = document.getElementById("changeDevice");

        const state = {
            selectedDeviceIndex: null,
            selectedAxisIndex: null
        };

        let lastRenderAt = 0;

        function getConnectedGamepads() {
            return Array.from(navigator.getGamepads()).filter(Boolean);
        }

        function normalizeAxisValue(value) {
            return ((value + 1) / 2) * 100;
        }

        function shortenDeviceName(name) {
            return name.split("(")[0].trim();
        }

        function getControllerColor(index) {
            const palette = [
                "90, 201, 255",
                "255, 130, 112",
                "116, 232, 171",
                "255, 196, 92",
                "187, 153, 255",
                "255, 138, 205"
            ];

            return palette[index % palette.length];
        }

        function getDeviceActivity(axes) {
            if (!axes.length) return 0;
            const total = axes.reduce((sum, value) => sum + Math.abs(value), 0);
            return total / axes.length; // 0..1
        }

        function render() {
            const gamepads = getConnectedGamepads();
            const maxAxes = gamepads.length ? Math.max(...gamepads.map((gp) => gp.axes.length)) : 3;
            const cardWidth = Math.max(180, Math.min(620, 132 + maxAxes * 42));

            app.style.setProperty("--card-width", `${cardWidth}px`);

            changeDeviceButton.hidden = state.selectedDeviceIndex === null;

            if (gamepads.length === 0) {
                app.innerHTML = `
                    <div class="card">
                        <div class="device-name">No controllers detected</div>
                        <p class="subtle">Press a pedal or button to wake the device up.</p>
                    </div>
                `;
                return;
            }

            app.innerHTML = `
                <div class="grid">
                    ${gamepads.map((gp) => {
                        const isSelected = gp.index === state.selectedDeviceIndex;
                        const activity = getDeviceActivity(gp.axes);
                        const bgAlpha = isSelected ? "0.18" : (0.08 + activity * 0.62).toFixed(3);
                        const deviceColor = getControllerColor(gp.index);
                        const glowAlpha = isSelected ? "0.28" : (0.18 + activity * 0.58).toFixed(3);

                        const axisMarkup = isSelected
                            ? `
                                <div class="axis-list vertical" style="--axis-count: ${gp.axes.length};">
                                    ${gp.axes.map((value, axisIndex) => {
                                        const selectedAxis = axisIndex === state.selectedAxisIndex ? "selected" : "";
                                        return `
                                            <div class="axis-row vertical ${selectedAxis}" data-axis-index="${axisIndex}" data-device-index="${gp.index}">
                                                <div class="pedal-meter">
                                                    <div class="pedal-fill" style="height: ${normalizeAxisValue(value)}%"></div>
                                                </div>
                                                <div class="axis-label">Axis ${axisIndex}</div>
                                            </div>
                                        `;
                                    }).join("")}
                                </div>
                            `
                            : "";

                        return `
                            <div
                                class="card ${isSelected ? "selected" : ""}"
                                data-device-index="${gp.index}"
                                style="
                                    background:
                                        radial-gradient(circle at 80% 8%, rgba(${deviceColor},${bgAlpha}), transparent 62%),
                                        radial-gradient(circle at 15% 95%, rgba(${deviceColor},${(bgAlpha * 0.35).toFixed(3)}), transparent 58%),
                                        linear-gradient(180deg, rgba(27,31,39,0.95), rgba(35,41,54,0.95));
                                    border-color: rgba(${deviceColor}, ${isSelected ? "0.78" : "0.38"});
                                    box-shadow: ${isSelected ? `0 0 0 2px rgba(${deviceColor}, 0.9), 0 14px 30px rgba(${deviceColor}, 0.32)` : `0 0 0 1px rgba(${deviceColor}, 0.25), 0 0 20px rgba(${deviceColor}, ${glowAlpha})`};
                            "
                            >
                                <div class="title-row">
                                    <div class="device-name">${shortenDeviceName(gp.id) || `Device ${gp.index}`}</div>
                                    <div class="badge">${gp.axes.length} axes</div>
                                </div>

                                ${isSelected ? `<p class="subtle" style="margin: 12px 0 0;">Pick the brake axis below.</p>` : ""}
                                ${axisMarkup}
                            </div>
                        `;
                    }).join("")}
                </div>

                ${
                    state.selectedDeviceIndex !== null && state.selectedAxisIndex !== null
                        ? `
                            <div class="result">
                                <strong>Ready:</strong>
                                using device ${state.selectedDeviceIndex}, axis ${state.selectedAxisIndex}
                            </div>
                        `
                        : ""
                }
            `;

            app.querySelectorAll(".card[data-device-index]").forEach((card) => {
                card.addEventListener("pointerdown", (event) => {
                    if (event.target.closest(".axis-row")) return;
                    const deviceIndex = Number(card.dataset.deviceIndex);

                    if (state.selectedDeviceIndex !== deviceIndex) {
                        state.selectedDeviceIndex = deviceIndex;
                        state.selectedAxisIndex = null;
                        render();
                    }
                });
            });

            app.querySelectorAll(".axis-row[data-axis-index]").forEach((row) => {
                row.addEventListener("pointerdown", () => {
                    state.selectedDeviceIndex = Number(row.dataset.deviceIndex);
                    state.selectedAxisIndex = Number(row.dataset.axisIndex);
                    render();
                });
            });
        }

        function pollGamepads(timestamp) {
            if (!lastRenderAt || timestamp - lastRenderAt > 50) {
                render();
                lastRenderAt = timestamp;
            }
            requestAnimationFrame(pollGamepads);
        }

        changeDeviceButton.addEventListener("click", () => {
            state.selectedDeviceIndex = null;
            state.selectedAxisIndex = null;
            render();
        });

        window.addEventListener("gamepadconnected", render);
        window.addEventListener("gamepaddisconnected", render);

        pollGamepads();
    </script>
</body>
</html>
